services:
  - type: web
    name: cineverse-ai-engine
    env: python

    rootDir: ai-engine

    buildCommand: pip install --upgrade pip && pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    plan: free

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: PORT
        value: 10000